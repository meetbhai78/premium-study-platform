name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  build:
    name: Build React & Android APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository codebase
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      # 3. Install frontend dependencies
      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: |
          npm install --legacy-peer-deps

      # 4. Compile React web app bundle
      - name: Compile React Web Bundle
        working-directory: ./frontend
        run: |
          npm run build

      # 5. Setup Java Development Kit (JDK 17) for Gradle compiler
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
          cache-dependency-path: 'frontend/android/build.gradle'

      # 6. Synchronize Capacitor assets
      - name: Sync Capacitor Android assets
        working-directory: ./frontend
        run: |
          npx cap sync

      # 7. Make Gradle wrapper executable
      - name: Make Gradle Executable
        working-directory: ./frontend/android
        run: chmod +x gradlew

      # 8. Compile the native Android debug APK
      - name: Build Android Debug APK
        working-directory: ./frontend/android
        run: ./gradlew assembleDebug

      # 9. Upload the final compiled APK as a downloadable Artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: studypro-app-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
