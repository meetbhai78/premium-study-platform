name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  build:
    name: Build React & Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1. Checkout repository codebase
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      # 3. Install frontend dependencies
      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: |
          npm install --legacy-peer-deps

      # 4. Compile React web app bundle
      - name: Compile React Web Bundle
        working-directory: ./frontend
        run: |
          npm run build

      # 5. Setup Java Development Kit (JDK 21) for Gradle compiler
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'
          cache-dependency-path: 'frontend/android/build.gradle'

      # 6. Synchronize Capacitor assets
      - name: Sync Capacitor Android assets
        working-directory: ./frontend
        run: |
          npx cap sync

      # 7. Make Gradle wrapper executable
      - name: Make Gradle Executable
        working-directory: ./frontend/android
        run: chmod +x gradlew

      # 8. Compile the native Android debug APK
      - name: Build Android Debug APK
        working-directory: ./frontend/android
        run: ./gradlew assembleDebug

      # 9. Upload the final compiled APK as a downloadable Artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: studypro-app-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      # 10. Automatically compile and upload to GitHub Latest Release
      - name: Release Latest APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Android Build"
          body: "આ આપણી EDUCATION07_ એન્ડ્રોઇડ એપ્લિકેશનનું લેટેસ્ટ કમ્પાઇલ થયેલું બિલ્ડ છે. દરેક અપડેટ સાથે આ ઓટોમેટિકલી અપડેટ થાય છે."
          draft: false
          prerelease: false
          files: |
            frontend/android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
